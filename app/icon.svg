<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background matching Olla Trade brand -->
  <rect width="64" height="64" rx="12" fill="#081018"/>

  <!-- Outer circle ring (the "O" in Olla) -->
  <circle cx="22" cy="32" r="13" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.85"/>

  <!-- Two green vertical bars (the "ll" in Olla) — brand signature -->
  <rect x="34" y="18" width="7" height="28" rx="3.5" fill="#00CC44"/>
  <rect x="44" y="18" width="7" height="28" rx="3.5" fill="#00CC44"/>
</svg>
